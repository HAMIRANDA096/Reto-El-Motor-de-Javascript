<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página con Manipulación del DOM</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Mi Página de Autos</h1>
    </header>

    <hr>

    <section>
        <h2>Galería de Autos Deportivos</h2>
    </section>

    <hr>

    <section id="imagenAuto">

        <div class="imagen">

            <img id="auto" src="Reto-El-Motor-de-Javascript
/triomlm.png" alt="Auto Deportivo">

            <h3 id="nombreAuto">Trío de Superdeportivos</h3>

            <p id="descripcionAuto">
                Una colección de automóviles deportivos de lujo que incluye Aston Martin, Lamborghini, Maserati y McLaren.
            </p>

        </div>

    </section>

    <div class="botones">

        <button id="cambiarColor">
            Cambiar Color de Fondo
        </button>

        <button id="cambiarImagen">
            Cambiar Auto
        </button>

    </div>

    <footer>
        <p class="pie">
            &copy; 2026 Mi Página de Autos. Todos los derechos reservados.
        </p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
